{% extends "base.html" %}

{% block title %}Регистрация - Knight's Market{% endblock %}

{% block content %}
<h1>🏰 Вступление в Гильдию 🏰</h1>

<div class="divider">◆ ◆ ◆</div>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Вступить</button>
</form>

<div class="divider">⚔ ⚔ ⚔</div>

<p style="text-align: center;">
    Уже в гильдии? <a href="{% url 'login' %}">Войти</a>
</p>
{% endblock %}
