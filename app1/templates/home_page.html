{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<h1>Товары</h1>

<div class="products-grid">
    {% for id in items %}
    <a href="{% url 'product' id=id %}" class="product-card">
        <div class="product-image">
            <img src="/static/img/card{{ id }}.jpg" alt="Товар {{ id }}">
        </div>
        <div class="product-info">
            <h3>Товар {{ id }}</h3>
            <p class="product-price">{{ id }}0 хлопка</p>
            {% if id in cart %}
                <form action="{% url 'remove_from_cart' id=id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-remove">Удалить</button>
                </form>
            {% else %}
                <form action="{% url 'add_to_cart' id=id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-add">В корзину</button>
                </form>
            {% endif %}
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
