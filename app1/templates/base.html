{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Site{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <a href="" class="logo">азон</a>
            <a href="{% url 'home' %}">Главная</a>
            <a href="{% url 'about' %}">О компании</a>
            <a href="{% url 'cart' %}">Корзина</a>
            <a href="{% url 'logout' %}">Выход ({{ user.username }})</a>
        {% else %}
            <a href="{% url 'login' %}">Вход</a>
        {% endif %}
        <div class="nav-separator"></div>
        {% if user.is_authenticated %}
            <a href="{% url 'fines' %}">Мои штрафы</a>
            <a href="{% url 'complaints' %}">Жалобная книга</a>
            <a href="{% url 'referral' %}" class="nav-referral">Сдать друга</a>
        {% endif %}
    </nav>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
